<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intent — Tech Radar, ARB & Atomized Roadmap</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface-2: #253549;
    --border: #334155;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --text-dim: #64748b;
    --accent-blue: #3b82f6;
    --accent-amber: #f59e0b;
    --accent-purple: #8b5cf6;
    --accent-green: #10b981;
    --green-bright: #22c55e;
    --red: #ef4444;
    --pink: #ec4899;
  }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    line-height: 1.6;
    font-size: 15px;
  }
  a { color: var(--accent-blue); text-decoration: none; }
  a:hover { color: var(--text); }
  .container { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; }

  /* Nav tabs */
  .tab-nav {
    display: flex; gap: 0; border-bottom: 2px solid var(--border);
    margin: 2rem 0 0;
  }
  .tab-btn {
    padding: 0.75rem 1.5rem; background: none; border: none;
    color: var(--text-dim); font-size: 0.9rem; font-weight: 600;
    cursor: pointer; border-bottom: 2px solid transparent;
    margin-bottom: -2px; transition: all 0.2s;
  }
  .tab-btn:hover { color: var(--text-muted); }
  .tab-btn.active { color: var(--accent-blue); border-bottom-color: var(--accent-blue); }
  .tab-content { display: none; padding: 2rem 0; }
  .tab-content.active { display: block; }

  h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 0.5rem; }
  h2 { font-size: 1.3rem; font-weight: 700; margin: 2rem 0 1rem; }
  h3 { font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; }
  .subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem; line-height: 1.7; }
