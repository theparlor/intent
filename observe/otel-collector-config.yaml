receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 256

  attributes/intent:
    actions:
      - key: service.name
        value: "intent"
        action: upsert
      - key: deployment.environment
        value: "local"
        action: upsert

exporters:
  debug:
    verbosity: detailed

  # Uncomment and configure for Grafana Cloud:
  # otlphttp/grafana:
  #   endpoint: ${GRAFANA_OTLP_ENDPOINT}
  #   headers:
  #     Authorization: "Basic ${GRAFANA_CLOUD_TOKEN}"

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, attributes/intent]
      exporters: [debug]
