---
# value-term-registry.yaml
#
# Authoritative write-through manifest of every score/gate in the ecosystem.
# A score or gate is "registered as healthy" only by an explicit declaration
# that names its value term and asserts it measures the outcome (not its own
# activity, not a handling proxy, not its own invocation count).
#
# Anti-pattern under guard:
#   A score or gate that measures its own ACTIVITY (proxy) instead of the
#   OUTCOME it serves — with no value term — saturates or accretes overhead
#   and cannot converge.  (flight-model §1; SIG-2026-05-30 §1)
#
# Three proven instances that seeded this registry:
#   1. CVRS freshness (cast) — measured corpus-touch (our handling timestamp)
#      instead of source recency → pinned 100%, meaningless. FIXED.
#   2. CVRS breadth/variety (cast) — measured modern channels[] instead of
#      body-of-work → historical voices scored 0. FIXED.
#   3. Autonomy Stop-hook (intent) — measured regex-fires (its own firing)
#      instead of drift-prevented → 95.8% overhead over 1,463 runs. CAPPED.
#
# scanner: value_term_audit.py (audit registry) + --scan (catch-net grep)
# related: Core/frameworks/intent/spec/autonomy-flight-model-v1-DRAFT.md §1
#          Core/products/cast/.intent/signals/SIG-2026-05-30-cross-session-coherence.md §1-§2
#          Core/frameworks/intent/tools/drag_dashboard.py (cap_guard sibling)
#
# Status vocabulary:
#   healthy  — declared correct, value_term names the outcome, measures: outcome
#   fixed    — was defective; fix shipped; still warrants the record
#   capped   — activity-proxy acknowledged; formal cap installed; successor in progress
#   defect   — known defect; remediation path documented; must not claim healthy

scores:

  # ── CAST: CVRS freshness ────────────────────────────────────────────────────
  - id: cvrs-freshness
    product: cast
    kind: score-dimension
    measures: outcome
    value_term: "source recency (last_post_date / authored-content date), topic-weighted at query time via RecencyFactor(topic_time_sensitivity)"
    outcome_signal: "last_post_date from sources.yaml; undatable sources → 0"
    activity_proxy_risk: "corpus-touch timestamp (our handling mtime) — THE ORIGINAL DEFECT, decoupled by commit 020edfbb"
    status: fixed
    remediation: "commit 020edfbb decoupled recency from CVRS; SPEC-topical-relevance-001 §RecencyFactor completes the topic-weighting arc"
    saturation_guard: "Core/products/cast/engine/scripts/cvrs_saturation_audit.py flags >40% at ceiling"
    notes: "Was pinned at 100% because we measured our own handling timestamp. Fix: read last_post_date from sources.yaml, make recency a topic-relative modifier (fast-moving topics penalize old dates harder than public-domain historical voices)."

  # ── CAST: CVRS breadth/variety ──────────────────────────────────────────────
  - id: cvrs-breadth-variety
    product: cast
    kind: score-dimension
    measures: outcome
    value_term: "voice body-of-work richness: unique work-forms (books, articles, talks, papers, interviews) regardless of era, derived from sources.yaml"
    outcome_signal: "work_form_count from sources.yaml; era-agnostic enumeration"
    activity_proxy_risk: "modern channels[] field in registry YAML — era-biased, excluded historical voices (breadth=0 for Lincoln/Tubman/Franklin)"
    status: fixed
    remediation: "SPEC-topical-relevance-001 §works-based-breadth decouples measurement from modern channel metadata; era-agnostic work_forms() derivation shipped"
    saturation_guard: "Core/products/cast/engine/scripts/cvrs_saturation_audit.py flags >40% at ceiling"
    notes: "Was 0 for all historical/public-domain voices because channels[] is a modern concept. Fix: derive from work-forms enumeration in sources.yaml, not from registry channels field."

  # ── INTENT: Autonomy Stop-hook lexical layer ────────────────────────────────
  - id: autonomy-stop-hook-lexical
    product: intent
    kind: gate
    measures: activity
    value_term: "NONE at the lexical layer — the CHECK fires count its own regex matches (activity), not drift-actually-prevented (outcome). Layer 4.2 structural successor measures the real outcome."
    outcome_signal: "drift-prevented rate (target: block_rate / invocations on genuine drift attempts); NOT lexical fire count"
    activity_proxy_risk: "regex-fires = the hook's own invocation count. First-order measurement of its own activity. 95.8% overhead observed (1,463 runs, 4.17% block rate)."
    status: capped
    remediation: "lexical-layer-freeze.yaml freezes at CHECK 6; drag_dashboard.py cap_guard enforces; Layer 4.2 structural positive-execution check is the successor (14-day warn-only calibration → promote-to-block + retire low-yield CHECKs). Sunset: 2026-06-12 promote; 2026-06-28 flight-test v1→v2."
    saturation_guard: "drag_dashboard.py cap_guard() enforces no new CHECK beyond frozen baseline without sanctioned debit+sunset"
    notes: "Capped, not fixed. The layer measures activity (regex-fires) instead of outcome (drift-prevented). This is the canonical exemplar of the anti-pattern. Layer 4.2 is the outcome-measuring successor."

  # ── INTENT: v1 weighted-sum trust gate ──────────────────────────────────────
  - id: signal-scoring-weighted-sum
    product: intent
    kind: gate
    measures: outcome
    value_term: "NONE — 0.00 of formula measures strategic value or upside. ~0.90 measures downside-of-failure; ~0.10 measures feasibility (precedent). A gate with no value term operationalizes caution, not strategy. (flight-model §1)"
    outcome_signal: "strategic value / upside of acting (missing); formula: clarity·0.30 + (1−blast_radius)·0.20 + reversibility·0.20 + testability·0.20 + precedent·0.10"
    activity_proxy_risk: "not activity-proxy per se — but zero value term makes it structurally equivalent: the gate can only restrict, never enable"
    status: defect
    remediation: "superseded_partially by Core/frameworks/intent/spec/autonomy-flight-model-v1-DRAFT.md. Successor adds Thrust=strategic_value×λ as the value term. v1 gate remains operational until four ratification dependencies cleared (autonomy-flight-model-ratification-tracker.md)."
    saturation_guard: ""
    notes: "Monotonically restrictive by construction. A panelist cannot vote bold inside this rubric. The persistent persona-panel lock-down behavior is the structurally-expected output of this math. (flight-model §1 diagnosis)"

  # ── INTENT: Flight-model Thrust ─────────────────────────────────────────────
  - id: flight-model-thrust
    product: intent
    kind: score-dimension
    measures: outcome
    value_term: "T = strategic_value × λ  — strategic_value is the upside estimate; λ (coefficient of bravery) is a tunable per-product throttle fit from the autonomy-drift signal corpus. This is the explicit value term the v1 gate lacked."
    outcome_signal: "strategic_value: LLM estimate (local, under uncertainty); λ: dashboard parameter set by Brien per-product, fit from SIG corpus; T > stall_threshold(L, D) is the airworthy check"
    activity_proxy_risk: "none by construction — λ tuning is an operator knob, not an activity counter; LLM RLHF risk-aversion is bypassed by design"
    status: healthy
    remediation: ""
    saturation_guard: "stall_threshold(L,D) is a coupled function, not a fixed ceiling — cannot saturate independently of L and D"
    notes: "The architectural unlock: estimate-decide split. LLM estimates component inputs; deterministic coupled model computes W/T/L/D; airworthy ⇔ L≥W AND T>stall_threshold. Solves stall AND overspeed modeling (the two crash modes v1 missed)."

  # ── CAST: Relevance recency modifier ────────────────────────────────────────
  - id: cast-relevance-recency
    product: cast
    kind: score-dimension
    measures: outcome
    value_term: "RecencyFactor(topic_time_sensitivity): recency penalty is topic-weighted, not a flat time decay. Fast-moving topics (AI, crypto) → high penalty for old dates; public-domain historical voices → low or zero penalty. Decouples calendar age from intellectual relevance."
    outcome_signal: "topic_time_sensitivity parameter (query-time, per topic); last_post_date from sources.yaml (or era anchor for public-domain figures)"
    activity_proxy_risk: "flat recency decay (treat all old dates equally) — the pre-SPEC-topical-relevance-001 model that scored historical voices near 0 on recency"
    status: healthy
    remediation: ""
    saturation_guard: "ceiling is topic-relative; a voice rated 1.0 recency on one topic may be 0.2 on another — saturation is per-topic-query, not per-voice absolute"
    notes: "The isomorphism with flight-model Thrust: relevance = DomainFit × Readiness × RecencyFactor(topic_time_sensitivity) × ValuesFactor(values_caution(voice,topic)) is structurally identical to autonomy = Value(Strategy) × Reversibility × CautionFactor(context). Same math, two uses."

  # ── CAST: values_caution equity layer ───────────────────────────────────────
  - id: values-caution
    product: cast
    kind: score-dimension
    measures: outcome
    value_term: "values_caution(voice, topic): down-weight factor applied when a voice's documented values are compromised relative to the query topic (e.g. era-compromised views on rights/equality topics). Measures alignment of voice-values to topic-values — the outcome is: avoid giving unqualified authority to a voice on topics where their historical record contradicts contemporary equity norms."
    outcome_signal: "voice equity_flags from registry (documented era-limitations); topic equity_sensitivity tag (query-time); caution = sigmoid of overlap between flags and sensitivity"
    activity_proxy_risk: "blanket historical exclusion (remove all old voices) — cruder alternative that loses legitimate intellectual contribution"
    status: healthy
    remediation: ""
    saturation_guard: "caution factor is bounded [0,1] and topic-scoped; a voice with equity_flags on rights topics may be fully authoritative on craft/science topics"
    notes: "Structurally identical to the autonomy gate (a context-relative down-weight). Canonical example of the §2 isomorphism: one pattern, two uses. Public-domain historical voices (Tubman, Lincoln, Franklin, da Vinci) use this to receive full authority on applicable topics while being down-weighted on compromised ones."
