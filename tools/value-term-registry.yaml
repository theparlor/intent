---
# value-term-registry.yaml — INTENT (per-product, write-through)
#
# Owned by Intent. Holds Intent's OWN scores/gates (autonomy gate, flight model).
# As of 2026-05-31 the registry is PER-PRODUCT and write-through: cast / topography /
# pulse each own their own value-term-registry.yaml beside their score code. The
# cross-product auditor discovers them all by name:
#
#   python3 value_term_audit.py --all            # audit every per-product registry under Core/
#   python3 value_term_audit.py --registry FILE  # audit one
#   python3 value_term_audit.py --scan PATH       # catch-net grep for unregistered scores
#   python3 value_term_invariants.py              # chain_audit invariant class (INV-VALUE-TERM-*)
#
# (Cast's CVRS dimensions + relevance/values scores moved to
#  Core/products/cast/value-term-registry.yaml — write-through fix: a cast score
#  declared in the intent repo drifts because the score-owner never edits it.)
#
# Anti-pattern under guard:
#   A score or gate that measures its own ACTIVITY (proxy) instead of the OUTCOME
#   it serves — with no value term — saturates or accretes overhead and cannot
#   converge. (flight-model §1; SIG-2026-05-30 §1)
#
# related: spec/autonomy-flight-model-v1-DRAFT.md §1 (the "no value term" diagnosis)
#          tools/drag_dashboard.py (cap_guard sibling for lexical-CHECK accretion)
#
# Status vocabulary:
#   healthy  — declared correct, value_term names the outcome, measures: outcome
#   fixed    — was defective; fix shipped; still warrants the record
#   capped   — activity-proxy acknowledged; formal cap installed; successor in progress
#   defect   — known defect; remediation path documented; must not claim healthy

scores:

  # ── INTENT: Autonomy Stop-hook lexical layer ────────────────────────────────
  - id: autonomy-stop-hook-lexical
    product: intent
    kind: gate
    measures: activity
    value_term: "NONE at the lexical layer — the CHECK fires count its own regex matches (activity), not drift-actually-prevented (outcome). Layer 4.2 structural successor measures the real outcome."
    outcome_signal: "drift-prevented rate (target: block_rate / invocations on genuine drift attempts); NOT lexical fire count"
    activity_proxy_risk: "regex-fires = the hook's own invocation count. First-order measurement of its own activity. 95.8% overhead observed (1,463 runs, 4.17% block rate)."
    status: capped
    remediation: "lexical-layer-freeze.yaml freezes at CHECK 6; drag_dashboard.py cap_guard enforces; Layer 4.2 structural positive-execution check is the successor (14-day warn-only calibration → promote-to-block + retire low-yield CHECKs). Sunset: 2026-06-12 promote; 2026-06-28 flight-test v1→v2."
    saturation_guard: "drag_dashboard.py cap_guard() enforces no new CHECK beyond frozen baseline without sanctioned debit+sunset"
    notes: "Capped, not fixed. The layer measures activity (regex-fires) instead of outcome (drift-prevented). This is the canonical exemplar of the anti-pattern. Layer 4.2 is the outcome-measuring successor."

  # ── INTENT: v1 weighted-sum trust gate ──────────────────────────────────────
  - id: signal-scoring-weighted-sum
    product: intent
    kind: gate
    measures: outcome
    value_term: "NONE — 0.00 of formula measures strategic value or upside. ~0.90 measures downside-of-failure; ~0.10 measures feasibility (precedent). A gate with no value term operationalizes caution, not strategy. (flight-model §1)"
    outcome_signal: "strategic value / upside of acting (missing); formula: clarity·0.30 + (1−blast_radius)·0.20 + reversibility·0.20 + testability·0.20 + precedent·0.10"
    activity_proxy_risk: "not activity-proxy per se — but zero value term makes it structurally equivalent: the gate can only restrict, never enable"
    status: defect
    remediation: "superseded_partially by Core/frameworks/intent/spec/autonomy-flight-model-v1-DRAFT.md. Successor adds Thrust=strategic_value×λ as the value term. v1 gate remains operational until four ratification dependencies cleared (autonomy-flight-model-ratification-tracker.md)."
    saturation_guard: ""
    notes: "Monotonically restrictive by construction. A panelist cannot vote bold inside this rubric. The persistent persona-panel lock-down behavior is the structurally-expected output of this math. (flight-model §1 diagnosis)"

  # ── INTENT: Flight-model Thrust ─────────────────────────────────────────────
  - id: flight-model-thrust
    product: intent
    kind: score-dimension
    measures: outcome
    value_term: "T = strategic_value × λ  — strategic_value is the upside estimate; λ (coefficient of bravery) is a tunable per-product throttle fit from the autonomy-drift signal corpus. This is the explicit value term the v1 gate lacked."
    outcome_signal: "strategic_value: LLM estimate (local, under uncertainty); λ: dashboard parameter set by Brien per-product, fit from SIG corpus; T > stall_threshold(L, D) is the airworthy check"
    activity_proxy_risk: "none by construction — λ tuning is an operator knob, not an activity counter; LLM RLHF risk-aversion is bypassed by design"
    status: healthy
    remediation: ""
    saturation_guard: "stall_threshold(L,D) is a coupled function, not a fixed ceiling — cannot saturate independently of L and D"
    notes: "The architectural unlock: estimate-decide split. LLM estimates component inputs; deterministic coupled model computes W/T/L/D; airworthy ⇔ L≥W AND T>stall_threshold. Solves stall AND overspeed modeling (the two crash modes v1 missed)."
